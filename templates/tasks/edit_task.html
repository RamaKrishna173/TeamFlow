{% extends 'base.html' %}

{% block content %}


<div class="card">


    <div class="card-header">


        <h3 class="card-title font-weight-bold">

            Edit Task

        </h3>


    </div>





    <div class="card-body">


        <form method="POST">


            {% csrf_token %}





            <div class="form-group">


                <label>
                    Project
                </label>


                <select name="project"

                        class="form-control"

                        required>


                    {% for project in projects %}


                        <option value="{{ project.id }}"

                        {% if project.id == task.project.id %}

                            selected

                        {% endif %}>


                            {{ project.name }}


                        </option>


                    {% endfor %}


                </select>


            </div>







            <div class="form-group">


                <label>
                    Task Title
                </label>


                <input type="text"

                       name="title"

                       value="{{ task.title }}"

                       class="form-control"

                       required>


            </div>







            <div class="form-group">


                <label>
                    Description
                </label>


                <textarea

                    name="description"

                    class="form-control"

                    rows="4">{{ task.description }}</textarea>


            </div>







            <div class="form-group">


                <label>
                    Assign To
                </label>



                <select name="assigned_to"

                        class="form-control">



                    <option value="">

                        Not Assigned

                    </option>




                    {% for user in users %}


                        <option value="{{ user.id }}"

                        {% if task.assigned_to and user.id == task.assigned_to.id %}

                            selected

                        {% endif %}>


                            {{ user.username }}


                        </option>


                    {% endfor %}



                </select>


            </div>







            <div class="form-group">


                <label>
                    Status
                </label>


                <select name="status"

                        class="form-control">



                    <option value="Pending"

                    {% if task.status == "Pending" %}

                        selected

                    {% endif %}>


                        Pending


                    </option>





                    <option value="In Progress"

                    {% if task.status == "In Progress" %}

                        selected

                    {% endif %}>


                        In Progress


                    </option>





                    <option value="Completed"

                    {% if task.status == "Completed" %}

                        selected

                    {% endif %}>


                        Completed


                    </option>



                </select>


            </div>







            <div class="form-group">


                <label>
                    Priority
                </label>


                <select name="priority"

                        class="form-control">



                    <option value="Low"

                    {% if task.priority == "Low" %}

                        selected

                    {% endif %}>


                        Low


                    </option>





                    <option value="Medium"

                    {% if task.priority == "Medium" %}

                        selected

                    {% endif %}>


                        Medium


                    </option>





                    <option value="High"

                    {% if task.priority == "High" %}

                        selected

                    {% endif %}>


                        High


                    </option>





                    <option value="Critical"

                    {% if task.priority == "Critical" %}

                        selected

                    {% endif %}>


                        Critical


                    </option>



                </select>


            </div>







            <div class="form-group">


                <label>
                    Due Date
                </label>


                <input type="date"

                       name="due_date"

                       value="{{ task.due_date|date:'Y-m-d' }}"

                       class="form-control">


            </div>







            <div class="form-group">


                <label>
                    Parent Task
                </label>


                <select name="parent_task"

                        class="form-control">



                    <option value="">

                        No Parent Task

                    </option>





                    {% for t in tasks %}


                        <option value="{{ t.id }}"

                        {% if task.parent_task and task.parent_task.id == t.id %}

                            selected

                        {% endif %}>


                            {{ t.title }}


                        </option>


                    {% endfor %}



                </select>


            </div>







            <button type="submit"

                    class="btn btn-success">


                Update Task


            </button>





            <a href="{% url 'task_list' %}"

               class="btn btn-secondary">


                Cancel


            </a>



        </form>


    </div>


</div>



{% endblock %}
