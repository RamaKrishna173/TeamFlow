{% extends 'base.html' %}

{% block content %}


<div class="card">


    <div class="card-header">

        <h3 class="card-title font-weight-bold">

            Add Task

        </h3>

    </div>



    <div class="card-body">


        <form method="POST">


            {% csrf_token %}




            <div class="form-group">


                <label>
                    Project
                </label>


                <select name="project" class="form-control" required>


                    {% for project in projects %}


                        <option value="{{ project.id }}">

                            {{ project.name }}

                        </option>


                    {% endfor %}


                </select>


            </div>







            <div class="form-group">


                <label>
                    Task Title
                </label>


                <input type="text"

                       name="title"

                       class="form-control"

                       placeholder="Enter task title"

                       required>


            </div>







            <div class="form-group">


                <label>
                    Description
                </label>


                <textarea

                    name="description"

                    class="form-control"

                    rows="4"

                    placeholder="Enter description">

                </textarea>


            </div>







            <div class="form-group">


                <label>
                    Assign To
                </label>


                <select name="assigned_to"

                        class="form-control">


                    <option value="">

                        Not Assigned

                    </option>



                    {% for user in users %}


                        <option value="{{ user.id }}">

                            {{ user.username }}

                        </option>


                    {% endfor %}



                </select>


            </div>







            <div class="form-group">


                <label>
                    Status
                </label>


                <select name="status"

                        class="form-control">


                    <option value="Pending">

                        Pending

                    </option>


                    <option value="In Progress">

                        In Progress

                    </option>


                    <option value="Completed">

                        Completed

                    </option>


                </select>


            </div>







            <div class="form-group">


                <label>
                    Priority
                </label>


                <select name="priority"

                        class="form-control">


                    <option value="Low">

                        Low

                    </option>


                    <option value="Medium" selected>

                        Medium

                    </option>


                    <option value="High">

                        High

                    </option>


                    <option value="Critical">

                        Critical

                    </option>


                </select>


            </div>







            <div class="form-group">


                <label>
                    Due Date
                </label>


                <input type="date"

                       name="due_date"

                       class="form-control">


            </div>







            <div class="form-group">


                <label>
                    Parent Task (Optional)
                </label>


                <select name="parent_task"

                        class="form-control">


                    <option value="">

                        No Parent Task

                    </option>



                    {% for task in tasks %}


                        <option value="{{ task.id }}">

                            {{ task.title }}

                        </option>


                    {% endfor %}



                </select>


            </div>







            <button type="submit"

                    class="btn btn-primary">


                Save Task


            </button>





            <a href="{% url 'task_list' %}"

               class="btn btn-secondary">


                Cancel


            </a>



        </form>


    </div>


</div>



{% endblock %}
