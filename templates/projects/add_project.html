{% extends 'base.html' %}

{% block content %}

<div class="card">

<div class="card-header">

<h3 class="card-title">
Add Project
</h3>

</div>


<div class="card-body">


<form method="POST">

{% csrf_token %}



<div class="form-group">

<label>
Project Name
</label>

<input type="text"
name="name"
class="form-control"
placeholder="Enter project name">

</div>




<div class="form-group">

<label>
Description
</label>

<textarea name="description"
class="form-control"
placeholder="Enter description"></textarea>

</div>




<div class="form-group">

<label>
Start Date
</label>

<input type="date"
name="start_date"
class="form-control">

</div>




<div class="form-group">

<label>
End Date
</label>

<input type="date"
name="end_date"
class="form-control">

</div>




<div class="form-group">

<label>
Priority
</label>

<select name="priority"
class="form-control">


<option value="">
Select Priority
</option>


<option value="Low">
Low
</option>


<option value="Medium">
Medium
</option>


<option value="High">
High
</option>


</select>

</div>





<div class="form-group">

<label>
Status
</label>


<select name="status"
class="form-control">


<option value="">
Select Status
</option>


<option value="Planning">
Planning
</option>


<option value="In Progress">
In Progress
</option>


<option value="Completed">
Completed
</option>


</select>


</div>




<button type="submit"
class="btn btn-primary">

Save Project

</button>



<a href="{% url 'project_list' %}"
class="btn btn-secondary">

Cancel

</a>



</form>


</div>

</div>


{% endblock %}
