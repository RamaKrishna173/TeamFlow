{% extends 'base.html' %}

{% block content %}

<div class="card">

<div class="card-header">

<h3 class="card-title">
Edit Project
</h3>

</div>


<div class="card-body">


<form method="POST">

{% csrf_token %}



<div class="form-group">

<label>
Project Name
</label>

<input type="text"
name="name"
value="{{ project.name }}"
class="form-control">

</div>




<div class="form-group">

<label>
Description
</label>

<textarea name="description"
class="form-control">{{ project.description }}</textarea>

</div>




<div class="form-group">

<label>
Start Date
</label>

<input type="date"
name="start_date"
value="{{ project.start_date|date:'Y-m-d' }}"
class="form-control">

</div>




<div class="form-group">

<label>
End Date
</label>

<input type="date"
name="end_date"
value="{{ project.end_date|date:'Y-m-d' }}"
class="form-control">

</div>




<div class="form-group">

<label>
Priority
</label>


<select name="priority"
class="form-control">


<option value="Low"
{% if project.priority == "Low" %}selected{% endif %}>
Low
</option>


<option value="Medium"
{% if project.priority == "Medium" %}selected{% endif %}>
Medium
</option>


<option value="High"
{% if project.priority == "High" %}selected{% endif %}>
High
</option>


</select>

</div>





<div class="form-group">

<label>
Status
</label>


<select name="status"
class="form-control">


<option value="Planning"
{% if project.status == "Planning" %}selected{% endif %}>
Planning
</option>


<option value="In Progress"
{% if project.status == "In Progress" %}selected{% endif %}>
In Progress
</option>


<option value="Completed"
{% if project.status == "Completed" %}selected{% endif %}>
Completed
</option>


</select>


</div>




<button type="submit"
class="btn btn-success">

Update Project

</button>



<a href="{% url 'project_list' %}"
class="btn btn-secondary">

Cancel

</a>



</form>


</div>

</div>


{% endblock %}
