{% extends 'base.html' %}

{% block content %}

<div class="card">

<div class="card-header">

<h3>
Create Account
</h3>

</div>


<div class="card-body">


<form method="POST">

{% csrf_token %}


<div class="form-group">

<label>
Username
</label>

<input type="text"
name="username"
class="form-control">

</div>



<div class="form-group">

<label>
Email
</label>

<input type="email"
name="email"
class="form-control">

</div>



<div class="form-group">

<label>
Password
</label>

<input type="password"
name="password"
class="form-control">

</div>



<div class="form-group">

<label>
Confirm Password
</label>

<input type="password"
name="confirm_password"
class="form-control">

</div>



<button class="btn btn-primary">

Register

</button>


<a href="{% url 'login' %}"
class="btn btn-secondary">

Login

</a>


</form>


</div>

</div>


{% endblock %}
